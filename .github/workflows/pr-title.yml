name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commit
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Lint PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            ci
            build
            chore
            test
            revert
            style
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject "{subject}" in the PR title "{title}" should
            start with a lowercase character (so it reads naturally
            after the type prefix, e.g. "feat: add foo" not
            "feat: Add foo").
          headerPattern: '^(\w+)(?:\(([^)]+)\))?!?: (.+)$'
          headerPatternCorrespondence: type, scope, subject
          validateSingleCommit: false
