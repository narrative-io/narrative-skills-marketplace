name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint, typecheck, knip, manifests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: SKILL.md docs up to date
        run: bun run check:skill-docs

      - name: Manifest validation
        run: bun run check:manifests

      - name: Skill version bumps
        if: github.event_name == 'pull_request'
        run: bun run check:versions --base=origin/${{ github.base_ref }}

      - name: Biome (format + lint)
        run: bun run check

      - name: TypeScript
        run: bun run typecheck

      - name: Knip (unused code/deps)
        run: bun run knip

  shellcheck:
    name: Shellcheck setup script
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: .
          additional_files: setup
          severity: warning
