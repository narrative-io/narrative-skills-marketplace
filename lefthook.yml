# Lefthook configuration.
#
# Local git hooks for contributors. Install with `bun run hooks:install`
# (or it'll happen automatically when you run `bash setup`).
#
# Keep this file lean — heavy checks belong in CI, not on every commit.

pre-commit:
  commands:
    skill-versions:
      glob: 'plugins/*/skills/*/SKILL.md.tmpl'
      run: bun run check:versions {staged_files}
    # Regenerate downstream artifacts (SKILL.md, skills.json, README.md,
    # mcp/*.json) whenever a generator-input source is staged. Keeps the
    # tree consistent so CI's --dry-run drift checks never trip.
    regen-artifacts:
      glob: '{plugins/*/skills/*/SKILL.md.tmpl,plugins/*/_snippets/*.md,snippets/*.md,plugins/*/.claude-plugin/plugin.json}'
      run: |
        bun run gen:all
        git add plugins/*/skills/*/SKILL.md skills.json README.md mcp/*.json

commit-msg:
  commands:
    commitlint:
      run: bunx --bun commitlint --edit {1}
