# Cross-system customer identity resolution via bipartite label
# propagation.
#
# Use when:
#   - You have an edge table linking customer IDs (per source) to
#     shared "bridge keys" (hashed emails, device IDs, phone numbers).
#   - You want one canonical component ID per resolved identity.
#
# Notes:
#   - `firstPartySources` / `thirdPartySources` hold **distinct
#     SOURCE_ID_TYPE values only** — the values that appear in the
#     edges table's `sourceSystemCol` column, partitioned by
#     first-party vs third-party origin (e.g. AFTERPAY, EXPERIAN
#     below). They are NEVER bridge-key types (the values in
#     `bridgeKeyTypeCol` like `sha256_email`, `device_id`,
#     `phone_hash`) — bridge keys are what the graph stitches
#     around, not sources.
#   - Discover the values empirically: ask for column statistics
#     on `sourceSystemCol` in the edges dataset, or run
#     `SELECT DISTINCT <sourceSystemCol> FROM <edgeDataset>` and
#     use the result verbatim. Don't hand-author from memory.
#   - `firstPartySources` is ordered by priority — the first source in
#     the list whose ID appears in a component wins the representative
#     ID. Put your higher-trust systems first.
#   - `maxDegreeThreshold` excludes "supernodes" — bridge keys that
#     touch more connections than the threshold. Lower this if you see
#     accidental mega-merges; raise it if real identities are getting
#     split.
#   - `maxComponentSize` caps how large a single resolved identity can
#     get before the algorithm gives up on it.

document:
  dsl: '1.0.0'
  namespace: identity
  name: resolve-connected-components
  version: '1.0.0'

do:
  - resolveIdentities:
      call: LabelConnectedComponents
      with:
        edgeDataset: customer_identity_edges
        outputDataset: resolved_customer_components
        maxDegreeThreshold: 500
        maxComponentSize: 10000
        maxIterations: 50
        sourceIdCol: customer_id
        sourceSystemCol: source_system
        bridgeKeyCol: bridge_key
        bridgeKeyTypeCol: bridge_key_type
        # Distinct SOURCE_ID_TYPE values (from `sourceSystemCol`)
        # for first-party data — never bridge-key types. Pull these
        # from edges-table column stats or a SELECT DISTINCT.
        firstPartySources:
          - AFTERPAY
          - CASHAPP
          - SQUARE
        # Same column, third-party-origin values.
        thirdPartySources:
          - EXPERIAN
          - ACXIOM
